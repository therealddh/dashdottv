name: Sync JioTV Cookies

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Cookies
        run: |
          python << 'PY'
          import re
          from pathlib import Path

          def normalize(name):
              return re.sub(r'\s+', ' ', name).strip().lower()

          # --------------------------------------------------
          # FIND FILES
          # --------------------------------------------------

          files = list(Path('.').glob('*.m3u')) + list(Path('.').glob('*.m3u8'))

          jiotv_file = next((f for f in files if 'jiotv' in f.name.lower()), None)
          cplay_file = next((f for f in files if 'cplay' in f.name.lower()), None)

          if not jiotv_file:
              raise Exception("JioTV playlist not found")

          if not cplay_file:
              raise Exception("CPlay playlist not found")

          print("JioTV:", jiotv_file)
          print("CPlay:", cplay_file)

          # --------------------------------------------------
          # READ FILES
          # --------------------------------------------------

          jiotv_lines = jiotv_file.read_text(errors='ignore').splitlines()
          cplay_lines = cplay_file.read_text(errors='ignore').splitlines()

          # --------------------------------------------------
          # EXTRACT COOKIES
          # --------------------------------------------------

          cookies = {}

          for i, line in enumerate(jiotv_lines):

              if not line.startswith('#EXTINF'):
                  continue

              match = re.search(r',(.+)$', line)
              if not match:
                  continue

              channel = normalize(match.group(1))

              cookie = None

              for j in range(i + 1, min(i + 10, len(jiotv_lines))):

                  l = jiotv_lines[j].strip()

                  if 'cookie=' in l.lower():
                      m = re.search(r'cookie=([^&|\s]+)', l, re.IGNORECASE)
                      if m:
                          cookie = m.group(1)
                          break

                  if l.lower().startswith('#exthttp:'):
                      m = re.search(r'"cookie"\s*:\s*"([^"]+)"', l)
                      if m:
                          cookie = m.group(1)
                          break

              if cookie:
                  cookies[channel] = cookie
                  print("[COOKIE]", channel)

          print("Total cookies:", len(cookies))

          # --------------------------------------------------
          # UPDATE CPLAY
          # --------------------------------------------------

          output = []
          i = 0
          updated = 0

          while i < len(cplay_lines):

              line = cplay_lines[i]

              if line.startswith('#EXTINF'):

                  match = re.search(r',(.+)$', line)
                  channel = normalize(match.group(1)) if match else None

                  cookie = cookies.get(channel)

                  output.append(line)
                  i += 1

                  block = []
                  inserted = False

                  while i < len(cplay_lines):

                      cur = cplay_lines[i]
                      s = cur.strip()

                      if s.startswith('#EXTINF'):
                          break

                      if s.lower().startswith('#exthttp:'):
                          i += 1
                          continue

                      block.append(cur)

                      if s.startswith('http'):
                          break

                      i += 1

                  new_block = []

                  for item in block:

                      if not inserted and item.strip().startswith('http'):

                          if cookie:
                              new_block.append(f'#EXTHTTP:{{"cookie":"{cookie}"}}')
                              updated += 1
                              print("[UPDATED]", channel)

                          inserted = True

                      new_block.append(item)

                  output.extend(new_block)
                  continue

              output.append(line)
              i += 1

          # --------------------------------------------------
          # SAVE OUTPUT FILE (FIXED)
          # --------------------------------------------------

          Path("jiotvplus.m3u8").write_text(
              '\n'.join(output),
              encoding='utf-8'
          )

          print("OUTPUT GENERATED: jiotvplus.m3u8")
          print("Updated channels:", updated)

          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jiotvplus.m3u8

          git diff --cached --quiet || git commit -m "Updated JioTV cookies"

          git push
