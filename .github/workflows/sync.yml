name: Sync JioTV Cookies

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Sync Cookies
        run: |
          python << 'PY'
          import re
          from pathlib import Path

          def normalize(name):
              return re.sub(r'\s+', ' ', name).strip().lower()

          # --------------------------------------------------
          # FIND FILE
          # --------------------------------------------------

          file = next(Path('.').glob('jiotv*.m3u*'), None)

          if not file:
              raise Exception("JioTV file not found")

          lines = file.read_text(errors='ignore').splitlines()

          # --------------------------------------------------
          # EXTRACT COOKIES (IF ANY)
          # --------------------------------------------------

          channel_data = {}

          for i, line in enumerate(lines):

              if line.startswith('#EXTINF'):

                  match = re.search(r',(.+)$', line)
                  if not match:
                      continue

                  channel = normalize(match.group(1))

                  cookie = None

                  for j in range(i + 1, min(i + 10, len(lines))):

                      l = lines[j].strip()

                      if 'cookie=' in l.lower():
                          m = re.search(r'cookie=([^&|\s]+)', l, re.IGNORECASE)
                          if m:
                              cookie = m.group(1)
                              break

                      if l.lower().startswith('#exthttp:'):
                          m = re.search(r'"cookie"\s*:\s*"([^"]+)"', l)
                          if m:
                              cookie = m.group(1)
                              break

                  if cookie:
                      channel_data[channel] = cookie
                      print("[COOKIE FOUND]", channel)

          print("Total cookies:", len(channel_data))

          # --------------------------------------------------
          # BUILD OUTPUT
          # --------------------------------------------------

          output = []
          i = 0

          while i < len(lines):

              line = lines[i]

              if line.startswith('#EXTINF'):

                  match = re.search(r',(.+)$', line)
                  channel = normalize(match.group(1)) if match else None

                  cookie = channel_data.get(channel)

                  output.append(line)
                  i += 1

                  while i < len(lines):

                      cur = lines[i]
                      s = cur.strip()

                      if s.startswith('#EXTINF'):
                          break

                      # remove old EXTHTTP
                      if s.lower().startswith('#exthttp:'):
                          i += 1
                          continue

                      output.append(cur)

                      # inject cookie after URL
                      if s.startswith('http') and cookie:
                          output.append(f'#EXTHTTP:{{"cookie":"{cookie}"}}')

                      i += 1

                  continue

              output.append(line)
              i += 1

          # --------------------------------------------------
          # SAVE OUTPUT
          # --------------------------------------------------

          Path("jiotvplus.m3u8").write_text(
              '\n'.join(output),
              encoding='utf-8'
          )

          print("OUTPUT GENERATED: jiotvplus.m3u8")

          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jiotvplus.m3u8

          git diff --cached --quiet || git commit -m "Updated JioTV cookies"

          git push
