name: Sync JioTV Cookies

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Update Cookies
        run: |
          python << 'PY'
          import re
          from pathlib import Path

          jiotv_file = Path('jiotv.m3u')
          cplay_file = Path('cplay.m3u')

          jiotv = jiotv_file.read_text(encoding='utf-8', errors='ignore').splitlines()
          cplay = cplay_file.read_text(encoding='utf-8', errors='ignore').splitlines()

          # --------------------------------------------------
          # Extract channel -> cookie from JioTV playlist
          # --------------------------------------------------
          jio_cookies = {}

          for i, line in enumerate(jiotv):
              if line.startswith('#EXTINF'):
                  match = re.search(r',(.+)$', line)
                  if not match:
                      continue

                  channel_name = match.group(1).strip().lower()

                  for j in range(i + 1, min(i + 10, len(jiotv))):
                      stream_line = jiotv[j]

                      if 'cookie=' in stream_line:
                          cookie_match = re.search(r'cookie=([^|]+.*)$', stream_line)

                          if cookie_match:
                              cookie = cookie_match.group(1).strip()
                              jio_cookies[channel_name] = cookie
                          break

          print(f'Found {len(jio_cookies)} cookies')

          # --------------------------------------------------
          # Update cplay.m3u
          # --------------------------------------------------
          updated = []
          i = 0
          updated_channels = 0

          while i < len(cplay):
              line = cplay[i]

              if line.startswith('#EXTINF'):
                  match = re.search(r',(.+)$', line)

                  if match:
                      channel_name = match.group(1).strip().lower()
                      cookie = jio_cookies.get(channel_name)

                      updated.append(line)
                      i += 1

                      block = []

                      while i < len(cplay):
                          current = cplay[i]

                          if current.startswith('#EXTINF'):
                              break

                          if current.startswith('#EXTHTTP:'):
                              i += 1
                              continue

                          block.append(current)

                          if current.startswith('http'):
                              break

                          i += 1

                      new_block = []
                      inserted = False

                      for item in block:
                          if not inserted and item.startswith('http'):
                              if cookie:
                                  new_block.append(
                                      f'#EXTHTTP:{{"cookie":"{cookie}"}}'
                                  )
                                  updated_channels += 1

                              inserted = True

                          new_block.append(item)

                      updated.extend(new_block)
                      continue

              updated.append(line)
              i += 1

          cplay_file.write_text(
              '\n'.join(updated),
              encoding='utf-8'
          )

          print(f'Updated {updated_channels} channels')
          PY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cplay.m3u

          git diff --cached --quiet || git commit -m "Updated JioTV cookies"

          git push
