name: JIO COSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate jiomob.m3u
        run: |
          set -e

          echo "📥 Fetching main source..."
          MAIN_URL="${{ secrets.JIO_JSON_URL }}"
          COOKIE_JSON_URL="${{ secrets.COOKIE_SOURCE_URL }}"

          if [ -z "$MAIN_URL" ]; then
            echo "❌ MAIN_URL not set"
            exit 1
          fi

          MAIN_DATA=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: plaYtv/7.1.5 (Linux;Android 15)" \
            "$MAIN_URL") || { echo "❌ Failed to fetch main source"; exit 1; }

          echo "📥 Fetching cookie JSON..."
          COOKIE_JSON=$(curl -sS --fail "$COOKIE_JSON_URL") || { echo "❌ Failed cookie JSON"; exit 1; }

          echo "#EXTM3U" > jiomob.m3u

          GLOBAL_COOKIE=$(echo "$COOKIE_JSON" | jq -r '
            if type=="object" and has("cookie") then .cookie
            elif type=="object" and has("cookies") then .cookies
            elif type=="array" and length>0 and .[0].cookie then .[0].cookie
            else ""
            end
          ')

          ############################################
          # 🔍 DETECT JSON OR M3U
          ############################################
          if echo "$MAIN_DATA" | jq -e . >/dev/null 2>&1; then
            echo "✅ Detected JSON input"

            echo "$MAIN_DATA" | jq -r --arg cookie "$GLOBAL_COOKIE" '

            def normalize:
              if type == "array" then .
              elif type == "object" then
                if has("channels") then .channels
                elif has("data") then .data
                elif has("list") then .list
                elif (.[] | type == "object") then [.[]]
                else []
                end
              else []
              end;

            normalize |
            map(select(type=="object"))[] |

            (.name // .title // .channel_name // "Unknown") as $name |
            (.tvg_logo // .logo // .icon // "") as $logo |
            (.tvg_id // .id // "") as $id |
            (.tvg_language // .language // "") as $lang |
            (.drmScheme // .drm // "") as $drm |
            (.drmLicense // .license // "") as $lic |
            (.link // .url // .stream_url // .mpd // .hls // "") as $link |

            if ($link | length) == 0 then empty else

            "#EXTINF:-1 " +
              (if $id != "" then "tvg-id=\"\($id)\" " else "" end) +
              (if $logo != "" then "tvg-logo=\"\($logo)\" " else "" end) +
              "group-title=\"\($lang)\"," +
              ($name | gsub(",";"\\,")) ,

            # DRM (clearkey)
            (if ($drm=="clearkey" and ($lic|test("^[^:]+:[^:]+$"))) then
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n" +
              "#KODIPROP:inputstream.adaptive.license_key=" + $lic
            else empty end),

            "#EXTVLCOPT:http-user-agent=plaYtv",

            (if ($cookie|length>0) then
              "#EXTHTTP:" + ({cookie:$cookie}|@json)
            else empty end),

            $link

            end
            ' >> jiomob.m3u

          else
            echo "✅ Detected M3U input"

            echo "$MAIN_DATA" | while IFS= read -r line; do

              if [[ "$line" == \#EXTINF* ]]; then
                echo "$line" >> jiomob.m3u

                echo "#EXTVLCOPT:http-user-agent=plaYtv" >> jiomob.m3u

                if [ -n "$GLOBAL_COOKIE" ]; then
                  echo "#EXTHTTP:$(jq -nc --arg c "$GLOBAL_COOKIE" '{cookie:$c}')" >> jiomob.m3u
                fi

              elif [[ "$line" == http* ]]; then
                echo "$line" >> jiomob.m3u
              fi

            done
          fi

          ############################################
          # CLEANUP + VALIDATION
          ############################################
          sed -i 's/[[:space:]]*$//' jiomob.m3u

          LINE_COUNT=$(wc -l < jiomob.m3u)
          if [ "$LINE_COUNT" -le 1 ]; then
            echo "❌ Empty playlist"
            exit 1
          fi

          echo "✅ jiomob.m3u created ($LINE_COUNT lines)"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jiomob.m3u

          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi

          git commit -m "JIOMOB Auto-update M3U: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
