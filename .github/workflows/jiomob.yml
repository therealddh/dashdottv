name: JIO COSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Build M3U
        run: |
          set -e

          MAIN_URL="${{ secrets.JIO_JSON_URL }}"
          COOKIE_URL="${{ secrets.COOKIE_SOURCE_URL }}"

          echo "📥 Fetching MAIN source..."
          MAIN_DATA=$(curl -sS --fail "$MAIN_URL")

          echo "📥 Fetching COOKIE source..."
          COOKIE_DATA=$(curl -sS --fail "$COOKIE_URL")

          echo "#EXTM3U" > jiomob.m3u

          ############################################
          # 🍪 EXTRACT COOKIE (JSON or M3U)
          ############################################

          GLOBAL_COOKIE=""

          if echo "$COOKIE_DATA" | jq -e . >/dev/null 2>&1; then
            echo "Cookie source = JSON"

            GLOBAL_COOKIE=$(echo "$COOKIE_DATA" | jq -r '
              if type=="object" and has("cookie") then .cookie
              elif type=="object" and has("cookies") then .cookies
              elif type=="array" and length>0 and .[0].cookie then .[0].cookie
              else ""
              end
            ')
          else
            echo "Cookie source = M3U"

            GLOBAL_COOKIE=$(echo "$COOKIE_DATA" | grep -oP '#EXTHTTP:\K.*' | head -n1 | jq -r '.cookie // empty')
          fi

          echo "🍪 Cookie length: ${#GLOBAL_COOKIE}"

          ############################################
          # 📺 MAIN SOURCE PROCESSING
          ############################################

          if echo "$MAIN_DATA" | jq -e . >/dev/null 2>&1; then

            echo "Main = JSON"

            echo "$MAIN_DATA" | jq -r --arg cookie "$GLOBAL_COOKIE" '

            def normalize:
              if type == "array" then .
              elif type == "object" then
                if has("channels") then .channels
                elif has("data") then .data
                elif has("list") then .list
                else []
                end
              else []
              end;

            normalize |
            map(select(type=="object"))[] |

            (.name // .title // "Unknown") as $name |
            (.tvg_logo // .logo // "") as $logo |
            (.tvg_id // "") as $id |
            (.tvg_language // "") as $lang |
            (.drmScheme // "") as $drm |
            (.drmLicense // "") as $lic |
            (.link // .url // .stream_url // "") as $link |

            if ($link|length)==0 then empty else

            "#EXTINF:-1 " +
              (if $id != "" then "tvg-id=\"\($id)\" " else "" end) +
              (if $logo != "" then "tvg-logo=\"\($logo)\" " else "" end) +
              "group-title=\"\($lang)\"," +
              ($name | gsub(",";"\\,")) ,

            (if ($drm=="clearkey" and ($lic|test("^[^:]+:[^:]+$"))) then
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n" +
              "#KODIPROP:inputstream.adaptive.license_key=" + $lic
            else empty end),

            "#EXTVLCOPT:http-user-agent=plaYtv",

            (if ($cookie|length>0) then
              "#EXTHTTP:" + ({cookie:$cookie}|@json)
            else empty end),

            $link

            end
            ' >> jiomob.m3u

          else

            echo "Main = M3U (SMART MERGE MODE)"

            HAS_COOKIE=0

            while IFS= read -r line; do

              if [[ "$line" == \#EXTINF* ]]; then
                echo "$line" >> jiomob.m3u

              elif [[ "$line" == \#EXTVLCOPT* ]]; then
                echo "$line" >> jiomob.m3u

              elif [[ "$line" == \#EXTHTTP* ]]; then
                echo "$line" >> jiomob.m3u
                HAS_COOKIE=1

              elif [[ "$line" == http* ]]; then

                # If MAIN has no cookie → use GLOBAL cookie
                if [ "$HAS_COOKIE" -eq 0 ] && [ -n "$GLOBAL_COOKIE" ]; then
                  echo "#EXTHTTP:$(jq -nc --arg c "$GLOBAL_COOKIE" '{cookie:$c}')" >> jiomob.m3u
                fi

                echo "$line" >> jiomob.m3u
                HAS_COOKIE=0
              fi

            done <<< "$MAIN_DATA"

          fi

          ############################################
          # ✅ VALIDATION
          ############################################

          sed -i 's/[[:space:]]*$//' jiomob.m3u

          COUNT=$(wc -l < jiomob.m3u)
          if [ "$COUNT" -le 1 ]; then
            echo "❌ Empty output"
            exit 1
          fi

          echo "✅ SUCCESS ($COUNT lines created)"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jiomob.m3u

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Auto update M3U $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
