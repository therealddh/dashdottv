name: Update JioTV Plus Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download playlist
        run: |
          curl -L \
            -A "plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0" \
            -o jiotvplus.m3u \
            "${{ secrets.PLAYLIST_URL }}"

      - name: Update playlist format
        run: |
          python3 <<'EOF'
          import re

          file = "jiotvplus.m3u"

          ua = "plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0"
          epg = "https://avkb.short.gy/epg.xml.gz"

          with open(file, "r", encoding="utf-8") as f:
              lines = f.readlines()

          output = []

          # Add EPG
          first = True
          for line in lines:
              if first and line.startswith("#EXTM3U"):
                  line = '#EXTM3U x-tvg-url="' + epg + '"\n'
                  first = False

              # Remove old user agents
              if line.startswith("#EXTVLCOPT:http-user-agent="):
                  continue

              output.append(line.rstrip("\n"))

          final = []

          i = 0
          while i < len(output):
              line = output[i]

              final.append(line)

              # After EXTINF add Kodi properties
              if line.startswith("#EXTINF"):
                  pass

              # Before stream URL add properties
              if line.startswith("http"):
                  final.insert(len(final)-1,
                      "#KODIPROP:inputstream=inputstream.adaptive")
                  final.insert(len(final)-1,
                      "#KODIPROP:inputstream.adaptive.manifest_type=mpd")
                  final.insert(len(final)-1,
                      "#KODIPROP:inputstream.adaptive.license_type=org.w3.clearkey")
                  final.insert(len(final)-1,
                      "#EXTVLCOPT:http-user-agent=" + ua)

              i += 1

          with open(file, "w", encoding="utf-8") as f:
              f.write("\n".join(final) + "\n")

          EOF

      - name: Remove duplicate Kodi properties
        run: |
          awk '!seen[$0]++' jiotvplus.m3u > clean.m3u
          mv clean.m3u jiotvplus.m3u

      - name: Commit playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add jiotvplus.m3u

          git diff --cached --quiet && exit 0

          git commit -m "Update jiotvplus.m3u"
          git push
