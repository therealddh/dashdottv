name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate cplaytv.m3u
        run: |
          # 1. Fetch Main JSON
          echo "📥 Fetching main JSON..."
          curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            -H "User-Agent: plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6" \
            -H "Accept: application/json" \
            "${{ secrets.MAIN_JSON_URL }}" -o main.json || { echo "❌ Failed to fetch main JSON"; exit 1; }

          # 2. Fetch Cookie JSON
          echo "📥 Fetching cookie JSON..."
          curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            "${{ secrets.COOKIE }}" -o cookie.json || { echo "❌ Failed to fetch cookie JSON"; exit 1; }

          # 3. Validate JSON Files
          if ! jq -e . main.json > /dev/null 2>&1; then
            echo "❌ MAIN_JSON is invalid. Content:"
            cat main.json | head -n 10
            exit 1
          fi

          if ! jq -e . cookie.json > /dev/null 2>&1; then
            echo "❌ COOKIE_JSON is invalid. The server actually sent:"
            echo "------------------------------------------"
            cat cookie.json
            echo -e "\n------------------------------------------"
            exit 1
          fi

          # 4. Extract Cookie and Generate M3U
          echo "#EXTM3U" > cplaytv.m3u
          GLOBAL_COOKIE=$(jq -r '
            if type=="object" and has("cookie") then .cookie
            elif type=="object" and has("cookies") then .cookies
            elif type=="array" and length>0 and ..cookie then ..cookie
            else ""
            end
          ' cookie.json)

          jq -r --arg cookie "$GLOBAL_COOKIE" '
          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") and (.channels | type == "array") then .channels
              elif has("data") and (.data | type == "array") then .data
              elif has("list") and (.list | type == "array") then .list
              elif (.[] | type == "object") then [.[]]
              else []
              end
            else []
            end;

          normalize |
          map(select(type == "object")) |
          .[] |

          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "") as $tvg_language |
          (.drmScheme // .drm_scheme // .drm // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $link |

          if ($link | length) == 0 then empty else

          "#EXTINF:-1 " +
            (if ($tvg_id | length > 0) then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_language)\" " +
            (if ($tvg_logo | length > 0) then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name | gsub(","; "\\,"))" |
          . as $extinf |

          (if ($drmScheme == "clearkey") and ($drmLicense | test("^[^:]+:[^:]+$")) then
            "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=" +
            (($drmLicense | split(":")) + ":" + ($drmLicense | split(":")))
          else "" end) as $drm |

          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.5%20(Linux%3BAndroid%2015)%20ExoPlayerLib/2.11.6%20YGX/69.69.69.69" as $ua |

          (if ($cookie | length > 0) then
            "#EXTHTTP:{\"cookie\":\"" +
            ($cookie | gsub("\n"; "") | gsub("\""; "\\\"")) +
            "\"}"
          else "" end) as $cookie_line |

          [
            $extinf,
            ($drm | select(. != "")),
            $ua,
            ($cookie_line | select(. != "")),
            $link
          ] | join("\n")

          end
          ' main.json >> cplaytv.m3u

          # 5. Cleanup and Push
          sed -i 's/[[:space:]]*$//' cplaytv.m3u
          LINE_COUNT=$(wc -l < cplaytv.m3u)
          echo "✅ cplaytv.m3u created ($LINE_COUNT lines)"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cplaytv.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi
          git commit -m "CPLAY Auto-update M3U: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
