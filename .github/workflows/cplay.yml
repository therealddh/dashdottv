name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching source files..."
          
          UA="plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6"

          # 1. Fetch Main JSON
          MAIN_JSON=$(curl -sSL --fail \
            --connect-timeout 15 \
            --max-time 30 \
            -H "User-Agent: $UA" \
            "${{ secrets.MAIN_JSON_URL }}") || exit 1

          # 2. Fetch Cookie from the M3U source
          # We extract the content inside the first "cookie":"..." block found in the file
          COOKIE_RAW=$(curl -sSL --fail "${{ secrets.COOKIE_JSON_URL }}")
          
          # Extracting cookie from #EXTHTTP:{"cookie":"..."} or similar patterns
          GLOBAL_COOKIE=$(echo "$COOKIE_RAW" | grep -oP '(?<="cookie":")[^"]*' | head -1)

          if [ -z "$GLOBAL_COOKIE" ]; then
            echo "⚠️ Warning: No cookie found in M3U source. Proceeding without one."
          else
            echo "✅ Cookie successfully extracted."
          fi

          echo "#EXTM3U" > cplaytv.m3u

          # 3. Generate the Kodi-compatible M3U
          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" --arg ua "$UA" '
          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") then .channels
              elif has("data") then .data
              elif has("list") then .list
              else [.[] | select(type=="object")] end
            else [] end;

          normalize | .[] | select(type == "object") |
          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "") as $tvg_lang |
          (.drmScheme // .drm_scheme // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $link |

          if ($link == "") then empty else
            "#EXTINF:-1 " +
            (if ($tvg_id != "") then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_lang)\" " +
            (if ($tvg_logo != "") then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name)\n" +
            (if ($drmScheme == "clearkey") then 
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=\($drmLicense)\n" 
            else "" end) +
            "#KODIPROP:inputstream.adaptive.manifest_headers=User-Agent=\($ua|@uri)\(if $cookie != "" then "&Cookie=\($cookie|@uri)" else "" end)\n" +
            "#KODIPROP:inputstream.adaptive.stream_headers=User-Agent=\($ua|@uri)\(if $cookie != "" then "&Cookie=\($cookie|@uri)" else "" end)\n" +
            $link + (if $cookie != "" then "|Cookie=\($cookie)&User-Agent=\($ua)" else "|User-Agent=\($ua)" end)
          end' >> cplaytv.m3u

          sed -i '/^[[:space:]]*$/d' cplaytv.m3u
          echo "✅ Finished: $(wc -l < cplaytv.m3u) lines created."

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cplaytv.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes to commit."
          else
            git commit -m "Kodi M3U Sync: $(date -u '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
