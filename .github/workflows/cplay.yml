name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching main JSON..."
          MAIN_JSON_URL="${{ secrets.MAIN_JSON_URL }}"
          COOKIE_SOURCE_URL="${{ secrets.COOKIE_SOURCE_URL }}"

          if [ -z "$MAIN_JSON_URL" ]; then
            echo "❌ MAIN_JSON_URL secret not set"
            exit 1
          fi

          MAIN_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6" \
            -H "Accept: application/json,text/plain,*/*" \
            "$MAIN_JSON_URL") || { echo "❌ Failed to fetch main JSON"; exit 1; }

          echo "📥 Extracting cookie from M3U source..."
          # This command fetches the M3U and extracts the content inside the "cookie":"..." section
          GLOBAL_COOKIE=$(curl -s "$COOKIE_SOURCE_URL" | grep -oP '(?<="cookie":")[^"]*' | head -n 1)

          if [ -z "$GLOBAL_COOKIE" ]; then
            echo "⚠️ Warning: Could not extract cookie from M3U source"
          else
            echo "✅ Cookie extracted successfully"
          fi

          echo "$MAIN_JSON" | jq -e . > /dev/null || { echo "❌ Invalid main JSON"; exit 1; }

          echo "#EXTM3U" > cplaytv.m3u

          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" '

          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") and (.channels | type == "array") then .channels
              elif has("data") and (.data | type == "array") then .data
              elif has("list") and (.list | type == "array") then .list
              elif (.[] | type == "object") then [.[]]
              else []
              end
            else []
            end;

          normalize |
          map(select(type == "object")) |
          .[] |

          (.name // .title // .channel_name // "Unknown") as $name
