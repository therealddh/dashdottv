name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching source files..."
          
          # User-Agent strictly as requested
          UA="plaYtv/7.1.3 (Linux;Android 13) ygx/824.1 ExoPlayerLib/824.0"

          # 1. Fetch Main JSON from secret
          MAIN_JSON=$(curl -sSL --fail \
            --connect-timeout 15 \
            --max-time 30 \
            -H "User-Agent: $UA" \
            "${{ secrets.MAIN_JSON_URL }}") || { echo "❌ Failed to fetch Main JSON"; exit 1; }

          # 2. Fetch Cookie Source M3U from secret
          COOKIE_RAW=$(curl -sSL --fail \
            --connect-timeout 15 \
            "${{ secrets.COOKIE }}") || { echo "❌ Failed to fetch Cookie Source"; exit 1; }
          
          # Extract the cookie string from the "cookie":"..." pattern
          GLOBAL_COOKIE=$(echo "$COOKIE_RAW" | grep -oP '(?<="cookie":")[^"]*' | head -1)

          if [ -z "$GLOBAL_COOKIE" ]; then
            echo "⚠️ No cookie found in source. Proceeding with empty cookie."
          else
            echo "✅ Cookie extracted successfully."
          fi

          # 3. Build the M3U
          echo "#EXTM3U" > cplaytv.m3u

          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" --arg ua "$UA" '
          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") then .channels
              elif has("data") then .data
              elif has("list") then .list
              else [.[] | select(type=="object")] end
            else [] end;

          normalize | .[] | select(type == "object") |
          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "Sports") as $tvg_lang |
          (.drmScheme // .drm_scheme // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $link |

          if ($link == "") then empty else
            "#EXTINF:-1 " +
            (if ($tvg_id != "") then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_lang)\" " +
            (if ($tvg_logo != "") then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name)\n" +
            
            # DRM Tags (if available)
            (if ($drmScheme == "clearkey" or ($drmLicense | contains(":"))) then 
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=\($drmLicense)\n" 
            else "" end) +
            
            # User-Agent Tag (Requirement 1)
            "#EXTVLCOPT:http-user-agent=\($ua)\n" +
            
            # Cookie Tag in JSON format (Requirement 2)
            (if ($cookie != "") then "#EXTHTTP:{\"cookie\":\"\($cookie)\"}\n" else "" end) +
            
            # Final Stream Link
            $link
          end' >> cplaytv.m3u

          # Cleanup trailing spaces/empty lines
          sed -i '/^[[:space:]]*$/d' cplaytv.m3u
          echo "✅ Finished: $(wc -l < cplaytv.m3u) lines created."

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cplaytv.m3u
          
          if git diff --cached --quiet; then
            echo "➡️ No changes to commit."
          else
            git commit -m "CPLAY Sync: $(date -u '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
