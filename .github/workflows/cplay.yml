name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching JSON data..."
          
          # Standard User-Agent for both fetching and the playlist
          UA="plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6"

          MAIN_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            -H "User-Agent: $UA" \
            "${{ secrets.MAIN_JSON_URL }}") || exit 1

          COOKIE_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            -H "User-Agent: Mozilla/5.0" \
            "${{ secrets.COOKIE_JSON_URL }}") || exit 1

          echo "#EXTM3U" > cplaytv.m3u

          # Extract Global Cookie
          GLOBAL_COOKIE=$(echo "$COOKIE_JSON" | jq -r '
            if type=="object" then (.cookie // .cookies // "")
            elif type=="array" and length>0 then (..cookie // "")
            else "" end')

          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" --arg ua "$UA" '
          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") then .channels
              elif has("data") then .data
              elif has("list") then .list
              else [.[] | select(type=="object")] end
            else [] end;

          normalize | .[] | select(type == "object") |
          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "") as $tvg_lang |
          (.drmScheme // .drm_scheme // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $link |

          if ($link == "") then empty else
            "#EXTINF:-1 " +
            (if ($tvg_id != "") then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_lang)\" " +
            (if ($tvg_logo != "") then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name)\n" +
            
            # Kodi ClearKey DRM Support
            (if ($drmScheme == "clearkey") then 
              "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=\($drmLicense)\n" 
            else "" end) +
            
            # Kodi Cookie & UA Headers (Encoded for manifest and stream)
            "#KODIPROP:inputstream.adaptive.manifest_headers=User-Agent=\($ua|@uri)\(if $cookie != "" then "&Cookie=\($cookie|@uri)" else "" end)\n" +
            "#KODIPROP:inputstream.adaptive.stream_headers=User-Agent=\($ua|@uri)\(if $cookie != "" then "&Cookie=\($cookie|@uri)" else "" end)\n" +
            
            # URL with Pipe syntax fallback for other players
            $link + (if $cookie != "" then "|Cookie=\($cookie)&User-Agent=\($ua)" else "|User-Agent=\($ua)" end)
          end' >> cplaytv.m3u

          # Cleanup trailing spaces/empty lines
          sed -i '/^[[:space:]]*$/d' cplaytv.m3u
          
          LINE_COUNT=$(wc -l < cplaytv.m3u)
          echo "✅ Generated $LINE_COUNT lines in cplaytv.m3u"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cplaytv.m3u
          if git diff --cached --quiet; then
            echo "➡️ No changes detected, skipping push."
          else
            git commit -m "Kodi M3U Update: $(date -u '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin main
          fi
