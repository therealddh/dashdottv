name: CPLAY COSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching main JSON..."
          MAIN_JSON_URL="${{ secrets.MAIN_JSON_URL }}"
          
          # NEW: URL for cookie source
          COOKIE_SOURCE_URL="https://raw.githubusercontent.com/alex4528x/m3u/refs/heads/main/jtv.m3u"

          if [ -z "$MAIN_JSON_URL" ]; then
            echo "❌ MAIN_JSON_URL secret not set"
            exit 1
          fi

          MAIN_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6" \
            -H "Accept: application/json,text/plain,*/*" \
            "$MAIN_JSON_URL") || { echo "❌ Failed to fetch main JSON"; exit 1; }

          echo "📥 Extracting cookie from M3U source..."
          # This command fetches the M3U and extracts the content inside the "cookie":"..." section
          GLOBAL_COOKIE=$(curl -s "$COOKIE_SOURCE_URL" | grep -oP '(?<="cookie":")[^"]*' | head -n 1)

          if [ -z "$GLOBAL_COOKIE" ]; then
            echo "⚠️ Warning: Could not extract cookie from M3U source"
          else
            echo "✅ Cookie extracted successfully"
          fi

          echo "$MAIN_JSON" | jq -e . > /dev/null || { echo "❌ Invalid main JSON"; exit 1; }

          echo "#EXTM3U" > cplaytv.m3u

          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" '

          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") and (.channels | type == "array") then .channels
              elif has("data") and (.data | type == "array") then .data
              elif has("list") and (.list | type == "array") then .list
              elif (.[] | type == "object") then [.[]]
              else []
              end
            else []
            end;

          normalize |
          map(select(type == "object")) |
          .[] |

          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "") as $tvg_language |
          (.drmScheme // .drm_scheme // .drm // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $raw_link |
          
          # CDN REPLACEMENT
          ($raw_link | gsub("https://jiotvbpkmob.cdn.jio.com/"; "https://jiotvpllive.cdn.jio.com/")) as $link |

          if ($link | length) == 0 then empty else

          "#EXTINF:-1 " +
            (if ($tvg_id | length > 0) then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_language)\" " +
            (if ($tvg_logo | length > 0) then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name | gsub(","; "\\,"))" |
          . as $extinf |

          (if ($drmScheme == "clearkey") and ($drmLicense | test("^[^:]+:[^:]+$")) then
            "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=" +
            (($drmLicense | split(":"))[0] + ":" + ($drmLicense | split(":"))[1])
          else "" end) as $drm |

          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.5%20(Linux%3BAndroid%2015)%20ExoPlayerLib/2.11.6%20YGX/69.69.69.69" as $ua |

          (if ($cookie | length > 0) then
            "#EXTHTTP:{\"cookie\":\"" +
            ($cookie | gsub("\n"; "") | gsub("\""; "\\\"")) +
            "\"}"
          else "" end) as $cookie_line |

          [
            $extinf,
            ($drm | select(. != "")),
            $ua,
            ($cookie_line | select(. != "")),
            $link
          ] | join("\n")

          end
          ' >> cplaytv.m3u

          sed -i 's/[[:space:]]*$//' cplaytv.m3u

          LINE_COUNT=$(wc -l < cplaytv.m3u)
          echo "✅ cplaytv.m3u created ($LINE_COUNT lines)"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add cplaytv.m3u

          if git diff --cached --quiet; then
            echo "➡️ No changes — skipping commit"
            exit 0
          fi

          git commit -m "CPLAY Auto-update M3U: $(date -u '+%Y-%m-%d %H:%M')"
          git push origin main
