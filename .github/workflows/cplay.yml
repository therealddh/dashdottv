name: CPLAY CUSTOM TV

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

concurrency:
  group: auto-update-m3u
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate cplaytv.m3u
        run: |
          echo "📥 Fetching main JSON..."
          MAIN_JSON_URL="${{ secrets.MAIN_JSON_URL }}"
          COOKIE_JSON_URL="${{ secrets.COOKIE_JSON_URL }}"

          if [ -z "$MAIN_JSON_URL" ]; then
            echo "❌ MAIN_JSON_URL secret not set"
            exit 1
          fi

          if [ -z "$COOKIE_JSON_URL" ]; then
            echo "❌ COOKIE_JSON_URL secret not set"
            exit 1
          fi

          # Fetch Main JSON
          MAIN_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: plaYtv/7.1.5 (Linux;Android 15) ExoPlayerLib/2.11.6" \
            -H "Accept: application/json,text/plain,*/*" \
            "$MAIN_JSON_URL") || { echo "❌ Failed to fetch main JSON"; exit 1; }

          # Fetch Cookie JSON
          echo "📥 Fetching cookie JSON..."
          COOKIE_JSON=$(curl -sS --fail \
            --connect-timeout 15 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            "$COOKIE_JSON_URL") || { echo "❌ Failed to fetch cookie JSON"; exit 1; }

          # Validate JSON structures
          echo "$MAIN_JSON" | jq -e . > /dev/null || { echo "❌ Invalid main JSON structure"; exit 1; }
          
          if ! echo "$COOKIE_JSON" | jq -e . > /dev/null; then
            echo "❌ Invalid cookie JSON. The server returned:"
            echo "------------------------------------------"
            echo "$COOKIE_JSON" | head -n 20
            echo "------------------------------------------"
            exit 1
          fi

          echo "#EXTM3U" > cplaytv.m3u

          GLOBAL_COOKIE=$(echo "$COOKIE_JSON" | jq -r '
            if type=="object" and has("cookie") then .cookie
            elif type=="object" and has("cookies") then .cookies
            elif type=="array" and length>0 and ..cookie then ..cookie
            else ""
            end
          ')

          echo "$MAIN_JSON" | jq -r --arg cookie "$GLOBAL_COOKIE" '
          def normalize:
            if type == "array" then .
            elif type == "object" then
              if has("channels") and (.channels | type == "array") then .channels
              elif has("data") and (.data | type == "array") then .data
              elif has("list") and (.list | type == "array") then .list
              elif (.[] | type == "object") then [.[]]
              else []
              end
            else []
            end;

          normalize |
          map(select(type == "object")) |
          .[] |

          (.name // .title // .channel_name // "Unknown") as $name |
          (.tvg_id // .tvgId // .id // "") as $tvg_id |
          (.tvg_logo // .logo // .icon // "") as $tvg_logo |
          (.tvg_language // .language // .lang // "") as $tvg_language |
          (.drmScheme // .drm_scheme // .drm // "") as $drmScheme |
          (.drmLicense // .license // "") as $drmLicense |
          (.link // .url // .stream_url // .hls // .mpd // "") as $link |

          if ($link | length) == 0 then empty else

          "#EXTINF:-1 " +
            (if ($tvg_id | length > 0) then "tvg-id=\"\($tvg_id)\" " else "" end) +
            "group-title=\"\($tvg_language)\" " +
            (if ($tvg_logo | length > 0) then "tvg-logo=\"\($tvg_logo)\" " else "" end) +
            ",\($name | gsub(","; "\\,"))" |
          . as $extinf |

          (if ($drmScheme == "clearkey") and ($drmLicense | test("^[^:]+:[^:]+$")) then
            "#KODIPROP:inputstream.adaptive.license_type=clearkey\n#KODIPROP:inputstream.adaptive.license_key=" +
            (($drmLicense | split(":")) + ":" + ($drmLicense | split(":")))
          else "" end) as $drm |

          "#EXTVLCOPT:http-user-agent=plaYtv/7.1.5%20(Linux%3BAndroid%2015)%20ExoPlayerLib/2.11.6%20YGX/69.69.69.69" as $ua |

          (if ($cookie | length > 0) then
            "#EXTHTTP:{\"cookie\":\"" +
            ($cookie | gsub("\n"; "") | gsub("\""; "\\\"")) +
            "\"}"
          else "" end) as $cookie_line |

          [
            $extinf,
            ($drm | select(. != "")),
            $ua,
            ($cookie_line | select(. != "")),
            $link
          ] | join("\n")

          end
          ' >> cplaytv.m3u

          sed -i 's/[[:space:]]*$//' cplaytv.m3u

          LINE_COUNT=$(wc -l < cplaytv.m3u)
          if [ "$LINE_COUNT" -le 1 ]; then
            echo "❌ cplaytv.m3u is empty"
            exit 1
          fi

          echo "✅ cplaytv.m3u created ($LINE_COUNT lines)"

      - name: Commit & Push
        run: |
          git config --global user.name "
