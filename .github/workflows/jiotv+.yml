name: Auto Update JioTV Playlist

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  
  # Allows manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run the Generator Script
        run: python jtv.py 

      - name: Commit and Push the Updated Playlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # This now perfectly matches the output of the fixed Python script
          git add jiotvpl.m3u
          
          # The '|| exit 0' prevents failure if the API data hasn't changed since the last run
          git commit -m "Auto-update: Refreshed JioTV M3U playlist" || exit 0
          
          git push
