name: Auto Update JioTV Playlist

on:
  schedule:
    # This cron syntax means: "At every 30th minute"
    - cron: '*/30 * * * *'
  
  # This allows you to also trigger the script manually from the "Actions" tab in GitHub
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run the Generator Script
        # IMPORTANT: Change 'main.py' to the actual name of your Python script
        run: python main.py 

      - name: Commit and Push the Updated Playlist
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiotvpl.m3u
          
          # The '|| exit 0' prevents the action from throwing an error if the script runs 
          # but the output file hasn't actually changed since the last run.
          git commit -m "Auto-update: Refreshed JioTV M3U playlist" || exit 0
          
          git push
