name: Build JioTV Playlist

on:
  schedule:
    - cron: "*/25 * * * *"
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run script
        env:
          JIO_URL: ${{ secrets.JIO_URL }}
        run: |
          python jtv.py

      - name: Ensure correct output file exists
        run: |
          echo "Checking output..."
          ls -R

          if [ ! -f jiotvpl.m3u ]; then
            echo "ERROR: jiotvpl.m3u not created by script"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add jiotvpl.m3u || true

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "Auto update jiotvpl.m3u"
          git push
