name: Update JioTVPlus Playlist

on:
  schedule:
    - cron: '0 */2 * * *' # Runs every 2 hours
  workflow_dispatch: # Allows manual triggering
  push:
    branches:
      - main
    paths:
      - 'jtv+.py' # Updated to match the script name in your run step
      - 'meta.txt'

# Opt into Node 24 to suppress deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Playlist Generator
        run: python jtv+.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add jiotv+.m3u
          git commit -m "Auto-update playlist: $(date)" || echo "No changes to commit"
          git push
